<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Multi-Tenant Task Management Dashboard">
  <title>TaskFlow | Multi-Tenant Platform</title>
  <link rel="stylesheet" href="/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- AUTHENTICATION SCREEN -->
  <main id="auth-screen" class="glass-panel scale-up active">
    <div class="auth-box">
      <h1 style="font-size: 2rem;">Secure Multi-Tenant Task Management</h1>

      <div class="tabs">
        <button id="tab-login" class="active" onclick="switchAuth('login')">Login</button>
        <button id="tab-signup" onclick="switchAuth('signup')">Sign Up</button>
      </div>

      <form id="auth-form" onsubmit="handleAuth(event)">
        <div id="signup-fields" style="display: none;">
          <input type="text" id="orgName" placeholder="Organization Name (e.g. Acme Corp)">
          <select id="roleName">
            <option value="ADMIN">Administrator (Full Access)</option>
            <option value="MEMBER">Member (Limited Access)</option>
          </select>
        </div>
        <input type="email" id="email" placeholder="Work Email" required>
        <input type="password" id="password" placeholder="Password" required>

        <button type="submit" class="btn-primary" id="submit-btn">Login</button>
      </form>

      <div class="divider">
        <span>OR</span>
      </div>

      <!-- Brownie Points: OAuth Integration Placholder Buttons -->
      <div class="oauth-buttons">
        <button class="btn-oauth google" onclick="handleOAuth('Google')">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#fff"
              d="M12.24 10.285V14.4h6.806c-.275 1.765-2.056 5.174-6.806 5.174-4.095 0-7.439-3.389-7.439-7.574s3.345-7.574 7.439-7.574c2.33 0 3.891.989 4.785 1.849l3.254-3.138C18.189 1.186 15.479 0 12.24 0c-6.635 0-12 5.365-12 12s5.365 12 12 12c6.926 0 11.52-4.869 11.52-11.726 0-.788-.085-1.39-.189-1.989H12.24z" />
          </svg>
          Continue with Google
        </button>
        <button class="btn-oauth facebook" onclick="handleOAuth('Facebook')">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#fff"
              d="M22.675 0h-21.35c-.732 0-1.325.593-1.325 1.325v21.351c0 .731.593 1.324 1.325 1.324h11.495v-9.294h-3.128v-3.622h3.128v-2.671c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12v9.293h6.116c.73 0 1.323-.593 1.323-1.325v-21.35c0-.732-.593-1.325-1.325-1.325z" />
          </svg>
          Continue with Facebook
        </button>
      </div>

    </div>
  </main>

  <!-- DASHBOARD SCREEN -->
  <main id="dashboard-screen" class="glass-panel fade-in" style="display: none;">
    <header>
      <div class="user-info">
        <h2 id="dash-org">Acme Corp</h2>
        <span id="dash-email">user@acme.com</span> <span class="badge" id="dash-role">ADMIN</span>
      </div>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </header>

    <div class="content">
      <div class="toolbar">
        <h3>Tasks</h3>
        <button class="btn-primary" onclick="openTaskModal()">+ New Task</button>
      </div>

      <div class="task-grid" id="task-list">
        <!-- Tasks will populate here -->
      </div>
    </div>
  </main>

  <!-- MODAL: Task Form -->
  <div id="task-modal" class="modal-bg">
    <div class="modal glass-panel scale-up">
      <h3 id="modal-title">Create Task</h3>
      <input type="text" id="task-title" placeholder="Task Title (e.g. Fix Database)">
      <textarea id="task-desc" placeholder="Task Description..." rows="4"></textarea>
      <select id="task-status">
        <option value="TODO">To Do</option>
        <option value="IN_PROGRESS">In Progress</option>
        <option value="DONE">Done</option>
      </select>
      <div class="modal-actions">
        <button onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveTask()" id="btn-save-task">Save Task</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Audit Log -->
  <div id="audit-modal" class="modal-bg">
    <div class="modal glass-panel scale-up" style="max-width: 600px;">
      <h3>Task History</h3>
      <div class="timeline" id="audit-timeline">
        <!-- Logs go here -->
      </div>
      <div class="modal-actions">
        <button onclick="closeAuditModal()" style="background: rgba(255,255,255,0.1);">Close</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>

</html>
