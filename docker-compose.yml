version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskdb
    volumes:
      - pg-data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/taskdb?schema=public
      JWT_SECRET: super-secret-key-for-jwt
    depends_on:
      - db
    # We can add a command here to run migrations on startup
    command: /bin/sh -c "npx prisma db push --accept-data-loss && node dist/index.js"

volumes:
  pg-data:
